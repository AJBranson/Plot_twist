<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 Plot Twist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT & RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #111D0F;
  --bg-surface:  #182B14;
  --bg-panel:    #1F3819;
  --plot-locked: #1A1A1A;
  --soil-a:      #5C3210;
  --soil-b:      #7A4422;
  --soil-c:      #4A2510;
  --gold:        #FFD140;
  --gold-dark:   #C89400;
  --coin-glow:   rgba(255,209,64,0.3);
  --xp-purple:   #A78BFA;
  --green-hi:    #6FCF3A;
  --green-mid:   #4CAF50;
  --green-dim:   #2D6B20;
  --ready-glow:  #9AFF50;
  --lock-col:    #4A4A4A;
  --text:        #E8F5DC;
  --text-dim:    rgba(232,245,220,0.55);
  --border:      rgba(120,200,60,0.22);
  --panel-bg:    rgba(20,42,16,0.97);
  --radius:      12px;
  --ff-head:     'Fredoka One', 'Trebuchet MS', sans-serif;
  --ff-body:     'Nunito', 'Segoe UI', sans-serif;
}

body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Metanet.page nav bar overlaps the top 70px of the iframe.
   This background strip blends the game header into that nav area. */
body::before {
  content: '';
  display: block;
  height: 70px;
  background: linear-gradient(180deg, #0C1A08 0%, #0C1A08 100%);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 99; /* below header (100) */
  pointer-events: none;
}

button { cursor: pointer; font-family: var(--ff-body); border: none; outline: none; }
button:active { transform: scale(0.95); }

/* ============================================================
   LAYOUT
   ============================================================ */
#game {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding-top: 70px; /* Account for Metanet.page nav bar overlay */
}

/* ============================================================
   HEADER
   ============================================================ */
#header {
  background: linear-gradient(180deg, #0C1A08 0%, #182B14 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

/* Center header content without clipping the background */
.header-inner {
  max-width: 980px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.game-title {
  font-family: var(--ff-head);
  font-size: 22px;
  color: var(--green-hi);
  text-shadow: 0 2px 8px rgba(111,207,58,0.5);
  white-space: nowrap;
  margin-right: 4px;
}

.header-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  flex: 1;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

.stat-pill .icon { font-size: 15px; }
.stat-pill.coins .val { color: var(--gold); }
.stat-pill.score .val { color: #7DD3FC; }

.level-pill {
  display: flex;
  flex-direction: column;
  gap: 3px;
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 20px;
  padding: 5px 12px;
}

.level-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
}

.level-badge {
  color: var(--xp-purple);
  font-family: var(--ff-head);
  font-size: 14px;
}

.level-title-text { color: var(--text-dim); font-size: 11px; }
.xp-text { color: var(--xp-purple); font-size: 11px; }

.xp-bar-outer {
  width: 120px;
  height: 5px;
  background: rgba(167,139,250,0.15);
  border-radius: 3px;
  overflow: hidden;
}

.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--xp-purple), #C4B5FD);
  border-radius: 3px;
  transition: width 0.6s ease;
}

.bsv-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,209,64,0.06);
  border: 1px solid rgba(255,209,64,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
}

.bsv-pill button {
  background: var(--gold);
  color: #1A1000;
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
}

/* ============================================================
   MAIN AREA
   ============================================================ */
#main {
  display: grid;
  grid-template-columns: 1fr 270px;
  gap: 0;
  flex: 1;
  min-height: 0;
  /* Center the gameplay area; prevents it stretching on wide screens */
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ============================================================
   FARM AREA
   ============================================================ */
#farm-area {
  padding: 16px;
  overflow-y: auto;
}

#farm-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.farm-name-wrap, .farmer-name-wrap {
  display: flex;
  align-items: baseline;
  gap: 5px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.farm-name-wrap:hover, .farmer-name-wrap:hover {
  background: rgba(111,207,58,0.1);
}
.farm-name-text {
  font-family: var(--ff-head);
  font-size: 18px;
  color: var(--text);
  letter-spacing: 0.3px;
}
.farmer-label {
  font-family: var(--ff-body);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.farmer-name-text {
  font-family: var(--ff-head);
  font-size: 16px;
  color: var(--green-hi);
}
.name-edit-icon {
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.15s;
  margin-left: 2px;
}
.farm-name-wrap:hover .name-edit-icon,
.farmer-name-wrap:hover .name-edit-icon { opacity: 1; }
.name-input {
  font-family: var(--ff-head);
  background: rgba(255,255,255,0.06);
  border: 1.5px solid var(--green-hi);
  border-radius: 6px;
  color: var(--text);
  padding: 2px 7px;
  outline: none;
  width: 140px;
  max-width: 140px;
}

#plots-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* ============================================================
   PLOT TILES
   ============================================================ */
.plot-tile {
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
}

.plot-tile:hover { transform: translateY(-2px); }

.plot-visual {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius) var(--radius) 0 0;
  overflow: hidden;
}

.plot-soil-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.plot-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.plot-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.5);
  padding: 3px 4px;
  font-size: 10px;
  font-weight: 800;
  text-align: center;
  color: var(--text);
}

/* States */
.plot-tile.locked .plot-visual {
  background: #131310;
  border: 2px solid rgba(255,255,255,0.06);
}

.plot-tile.empty .plot-visual {
  border: 2px solid rgba(90,50,20,0.6);
}

.plot-tile.plant-target .plot-visual {
  border: 2px dashed var(--green-hi);
  box-shadow: 0 0 12px rgba(111,207,58,0.4);
  animation: pulse-green 1.5s ease-in-out infinite;
}

.plot-tile.growing .plot-visual {
  border: 2px solid rgba(76,175,80,0.4);
}

.plot-tile.ready .plot-visual {
  border: 2px solid var(--ready-glow);
  box-shadow: 0 0 16px rgba(154,255,80,0.5);
  animation: pulse-ready 1.2s ease-in-out infinite;
}

.plot-footer {
  background: rgba(10,20,8,0.85);
  padding: 4px 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-align: center;
  border-top: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.plot-footer .footer-harvest {
  color: var(--ready-glow);
  font-size: 11px;
}

.plus-sign {
  font-size: 28px;
  color: rgba(255,255,255,0.18);
  font-weight: 300;
  line-height: 1;
}

.plant-target .plus-sign {
  color: rgba(111,207,58,0.5);
}

/* Progress ring */
.progress-ring-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  pointer-events: none;
}

.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); }
.progress-ring-fill { fill: none; stroke: var(--green-mid); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

/* Crop art on plot */
.crop-art {
  transition: transform 0.5s ease, opacity 0.5s ease;
  transform-origin: bottom center;
}

/* Harvest sparkle */
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 8px rgba(111,207,58,0.3); }
  50%       { box-shadow: 0 0 20px rgba(111,207,58,0.7); }
}
@keyframes pulse-ready {
  0%, 100% { box-shadow: 0 0 12px rgba(154,255,80,0.4); }
  50%       { box-shadow: 0 0 28px rgba(154,255,80,0.9); }
}
@keyframes harvest-pop {
  0%   { transform: scale(1); opacity: 1; }
  50%  { transform: scale(1.3); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes coin-float {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-5px); }
  40%, 80% { transform: translateX(5px); }
}
.shake { animation: shake 0.4s ease; }

/* ============================================================
   SHOP SIDEBAR
   ============================================================ */
#shop-sidebar {
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#shop-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

#shop-title {
  font-family: var(--ff-head);
  font-size: 16px;
  color: var(--green-hi);
}

#shop-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
  min-height: 15px;
}

#shop-crops-list {
  overflow-y: auto;
  flex: 1;
  padding: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  align-content: start;
}

/* Scrollbar styling */
#shop-crops-list::-webkit-scrollbar { width: 4px; }
#shop-crops-list::-webkit-scrollbar-track { background: transparent; }
#shop-crops-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.shop-level-divider {
  font-size: 10px;
  font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 4px 2px 2px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
  /* Span both columns */
  grid-column: 1 / -1;
}

.crop-card {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 7px 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
  /* Remove the old flex-row assumptions */
}

.crop-card:hover { background: rgba(111,207,58,0.08); border-color: rgba(111,207,58,0.3); }

.crop-card.selected {
  background: rgba(111,207,58,0.15);
  border-color: var(--green-hi);
  box-shadow: 0 0 10px rgba(111,207,58,0.25);
}

.crop-card.locked-crop {
  opacity: 0.4;
  cursor: not-allowed;
  filter: grayscale(0.6);
}

.crop-card.unaffordable {
  opacity: 0.6;
}

.crop-card-icon {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 7px;
  overflow: hidden;
}

.crop-card-info {
  flex: 1;
  min-width: 0;
}

.crop-card-name {
  font-size: 11px;
  font-weight: 800;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.crop-card-stats {
  display: flex;
  gap: 4px;
  margin-top: 2px;
  font-size: 9px;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.crop-stat-coin { color: var(--gold); font-weight: 700; }
.crop-stat-sell { color: var(--green-hi); font-weight: 700; }
.crop-stat-time { color: #93C5FD; }

.crop-lock-badge {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  background: rgba(100,100,100,0.5);
  padding: 2px 5px;
  border-radius: 8px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ============================================================
   NOTIFICATIONS & LEVEL UP
   ============================================================ */
#notif-container {
  position: fixed;
  top: 70px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.notif {
  background: rgba(20,40,16,0.96);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  animation: notif-in 0.3s ease forwards;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-width: 240px;
}

.notif.harvest  { border-color: var(--green-hi); }
.notif.levelup  { border-color: var(--xp-purple); background: rgba(30,20,50,0.97); }
.notif.unlock   { border-color: var(--gold); }
.notif.error    { border-color: #FF6B6B; }

@keyframes notif-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes notif-out {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(20px); }
}
.notif.leaving { animation: notif-out 0.3s ease forwards; }

/* Floating coin label */
.float-label {
  position: fixed;
  font-family: var(--ff-head);
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  pointer-events: none;
  z-index: 300;
  animation: coin-float 0.9s ease forwards;
}

/* ============================================================
   MOBILE
   ============================================================ */
@media (max-width: 768px) {
  #main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; border-left: none; border-right: none; }
  #shop-sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 260px; }
  #shop-crops-list { flex-direction: row; flex-wrap: wrap; }
  .shop-level-divider { width: 100%; }
  .crop-card { width: calc(50% - 6px); flex-shrink: 0; }
  #plots-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 480px) {
  #plots-grid { grid-template-columns: repeat(2, 1fr); }
  .header-stats { gap: 6px; }
  .xp-bar-outer { width: 80px; }
}

/* ============================================================
   STORAGE AREA
   ============================================================ */
#storage-area {
  margin-top: 18px;
}

#storage-heading {
  font-family: var(--ff-head);
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#storage-count-badge {
  font-family: var(--ff-body);
  font-size: 10px;
  font-weight: 800;
  background: rgba(111,207,58,0.18);
  color: var(--green-hi);
  border-radius: 10px;
  padding: 2px 7px;
}

#storage-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.storage-empty {
  color: var(--text-dim);
  font-size: 12px;
  padding: 10px 4px;
  font-style: italic;
}

.seed-tile {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: transform 0.12s;
  user-select: none;
}

.seed-tile:hover { transform: translateY(-2px); }

.seed-tile-art {
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.seed-tile.selected .seed-tile-art {
  border-color: var(--green-hi);
  box-shadow: 0 0 10px rgba(111,207,58,0.5);
}

.seed-tile-count {
  position: absolute;
  top: 2px;
  right: 3px;
  background: var(--gold);
  color: #1A1000;
  font-size: 9px;
  font-weight: 900;
  font-family: var(--ff-body);
  border-radius: 7px;
  padding: 1px 4px;
  line-height: 1.3;
  pointer-events: none;
}

.seed-tile-name {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  text-align: center;
  max-width: 52px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.seed-tile.selected .seed-tile-name { color: var(--green-hi); }

/* ============================================================
   SHOP QTY PICKER
   ============================================================ */
.crop-card-qty {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}

.qty-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.1s;
}

.qty-btn:hover { background: rgba(255,255,255,0.16); }

.qty-display {
  min-width: 22px;
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
}

.qty-total {
  flex: 1;
  font-size: 10px;
  color: var(--gold);
  font-weight: 700;
  text-align: right;
}

.buy-btn {
  background: var(--green-hi);
  color: #0A1F06;
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
  border-radius: 8px;
  padding: 4px 10px;
  transition: background 0.15s;
  flex-shrink: 0;
}

.buy-btn:hover { background: #88F54A; }
.buy-btn:disabled { background: rgba(111,207,58,0.25); color: var(--text-dim); cursor: not-allowed; }

.bsv-buy-btn {
  background: linear-gradient(135deg, #C8860A, #F5A623);
  color: #1A0800;
  font-size: 11px;
  font-weight: 800;
  font-family: var(--ff-body);
  border-radius: 8px;
  padding: 4px 8px;
  transition: opacity 0.15s;
  flex-shrink: 0;
  white-space: nowrap;
}
.bsv-buy-btn:hover { opacity: 0.85; }
.bsv-buy-btn:disabled { background: rgba(200,134,10,0.25); color: var(--text-dim); cursor: not-allowed; }

.crop-card.expanded {
  background: rgba(111,207,58,0.09);
  border-color: rgba(111,207,58,0.4);
  flex-direction: column;
  align-items: stretch;
  /* Span both columns when the qty picker is open */
  grid-column: 1 / -1;
}

.crop-card.expanded .crop-card-main {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ============================================================
   MISC
   ============================================================ */
.selected-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(111,207,58,0.12);
  border: 1px solid var(--green-hi);
  border-radius: 10px;
  padding: 5px 10px;
  margin: 6px 8px 0;
  font-size: 11px;
  color: var(--green-hi);
  font-weight: 700;
  /* Span full width — sits above the 2-col grid in its own element */

<script type="module">
  const eventTarget = new EventTarget();
  const sendCommand = (commandObj) => {
    try {
      window.parent.postMessage({ command: "ninja-app-command", detail: commandObj }, "*");
      eventTarget.dispatchEvent(new CustomEvent('platform-command', { detail: commandObj }));
    } catch (err) { console.error('SDK send error:', err); }
  };
  const onCommand = (callback) => {
    window.addEventListener('message', (event) => {
      if (event.data && event.data.command === "ninja-app-command") callback(event.data);
    });
  };
  window.platformSDK = { sendCommand, onCommand };
</script>

// Seedling SVG for growing state
function seedlingSVG(progress) {
  const h = 8 + progress * 22; // stem grows from 8 to 30
  const lw = 4 + progress * 8;
  const lo = 0.3 + progress * 0.5;
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <rect x="${29}" y="${58 - h}" width="3" height="${h}" rx="1.5" fill="#2D6B20"/>
    <ellipse cx="${26 - lw*0.3}" cy="${58 - h + 4}" rx="${lw}" ry="${lw*0.55}" fill="#4CAF50" opacity="${lo}" transform="rotate(-25 ${26 - lw*0.3} ${58 - h + 4})"/>
    <ellipse cx="${34 + lw*0.3}" cy="${58 - h + 6}" rx="${lw}" ry="${lw*0.55}" fill="#66BB6A" opacity="${lo}" transform="rotate(25 ${34 + lw*0.3} ${58 - h + 6})"/>
  </svg>`;
}

// Progress ring SVG
function progressRingSVG(progress) {
  const r = 44;
  const cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - progress);
  return `<svg class="progress-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="progress-ring-bg" cx="${cx}" cy="${cy}" r="${r}" stroke-width="5"/>
    <circle class="progress-ring-fill" cx="${cx}" cy="${cy}" r="${r}"
      stroke-width="5"
      stroke-dasharray="${circ.toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}"/>
  </svg>`;
}

// Lock SVG
function lockSVG() {
  return `<svg width="32" height="38" viewBox="0 0 32 38" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="16" width="24" height="20" rx="4" fill="#3A3A3A" stroke="#555" stroke-width="1.5"/>
    <path d="M9 16 V11 Q9 3 16 3 Q23 3 23 11 V16" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>
    <circle cx="16" cy="25" r="4" fill="#666" stroke="#888" stroke-width="1"/>
    <rect x="14.5" y="25" width="3" height="5" rx="1.5" fill="#666"/>
  </svg>`;
}

// ============================================================
// GAME STATE
// ============================================================
const DEFAULT_STATE = {
  coins: 2,
  totalXP: 0,
  level: 1,
  prestige: 0,          // 0-50; each prestige resets farm, grants +10% sell bonus
  farmName: 'My Farm',    // editable, max 15 chars
  farmerName: 'Farmer',   // editable, max 15 chars
  selectedCrop: null,   // cropId selected from storage, ready to plant
  shopExpanded: null,   // cropId whose qty picker is open in the shop
  inventory: {},        // { cropId: count }
  plots: Array.from({length:20}, (_, i) => ({
    idx: i,
    unlocked: i === 0,
    harvestedCount: 0,
    cropId: null,
    plantedAt: null,
    ready: false,
  })),
  walletConnected: false,
  walletAddress: null,
  cropHarvests: {},      // { cropId: totalCount } — lifetime, survives prestige
  totalHarvestCount: 0, // lifetime total harvests
  totalCoinsEarned: 0,  // lifetime coins earned from harvests
  achievementsEarned: [], // array of achievement ids earned

  lastEventTime: 0,      // ms timestamp of last random event
  merchantActive: false, // is merchant banner showing?
  merchantDeal: null,    // current deal object
  merchantExpiry: 0,     // ms timestamp when merchant leaves
};

let G = null; // game state

// ============================================================
// PERSISTENCE
// ============================================================
const SAVE_KEY = 'idle_farm_v1';

function saveGame() {
  try {
    const saveData = {
      coins: G.coins,
      totalXP: G.totalXP,
      level: G.level,
      prestige: G.prestige,
      farmName: G.farmName,
      farmerName: G.farmerName,
      inventory: G.inventory,
      plots: G.plots.map(p => ({
        idx: p.idx,
        unlocked: p.unlocked,
        harvestedCount: p.harvestedCount,
        cropId: p.cropId,
        plantedAt: p.plantedAt,
        ready: p.ready,
      })),
      walletConnected: G.walletConnected,
      walletAddress: G.walletAddress,
      cropHarvests: G.cropHarvests,
      totalHarvestCount: G.totalHarvestCount,
      totalCoinsEarned: G.totalCoinsEarned,
      achievementsEarned: G.achievementsEarned,
      lastEventTime: G.lastEventTime,
      merchantExpiry: G.merchantExpiry,
      merchantDeal: G.merchantDeal,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      G = JSON.parse(JSON.stringify(DEFAULT_STATE));
      G.coins = saved.coins ?? G.coins;
      G.totalXP = saved.totalXP ?? G.totalXP;
      G.level = saved.level ?? G.level;
      G.prestige = saved.prestige ?? 0;
      G.farmName = saved.farmName ?? 'My Farm';
      G.farmerName = saved.farmerName ?? 'Farmer';
      G.inventory = saved.inventory ?? {};
      G.walletConnected = saved.walletConnected ?? false;
      G.cropHarvests       = saved.cropHarvests       ?? {};
      G.totalHarvestCount  = saved.totalHarvestCount  ?? 0;
      G.totalCoinsEarned   = saved.totalCoinsEarned   ?? 0;
      G.achievementsEarned = saved.achievementsEarned ?? [];
      G.lastEventTime  = saved.lastEventTime  ?? 0;
      G.merchantExpiry = saved.merchantExpiry ?? 0;
      G.merchantDeal   = saved.merchantDeal   ?? null;
      G.merchantActive = (saved.merchantDeal && saved.merchantExpiry > Date.now());
      G.walletAddress = saved.walletAddress ?? null;
      if (saved.plots) {
        saved.plots.forEach((sp, i) => {
          if (G.plots[i]) Object.assign(G.plots[i], sp);
        });
      }
      G.selectedCrop = null;
      G.shopExpanded = null;
      return;
    }
  } catch(e) { console.warn('Load failed:', e); }
  G = JSON.parse(JSON.stringify(DEFAULT_STATE));
}

// ============================================================
// HELPERS
// ============================================================
function getLevelData(lvl) { return LEVELS[Math.min(lvl - 1, LEVELS.length - 1)]; }
function getCurrentLevel() { return getLevelData(G.level); }

function getAvailableCrops() {
  return CROPS.filter(c => c.unlockLevel <= G.level);
}

function isCropUnlocked(cropId) {
  const c = CROP_MAP[cropId];
  return c && c.unlockLevel <= G.level;
}

// Prestige sell multiplier: each prestige adds 10%
function prestigeMultiplier() {
  return 1 + (G.prestige * 0.10);
}

// Perform a prestige reset (only at level 10, max 50 prestiges)
function doPrestige() {
  if (G.level < 10) {
    notify('⚠️ Reach Level 10 (Master) to prestige!', 'error');
    return;
  }
  if (G.prestige >= 50) {
    notify('✨ Maximum prestige (50) already reached!', 'error');
    return;
  }
  const nextPrestige = G.prestige + 1;
  const bonus = Math.round(nextPrestige * 10);
  if (!confirm('Prestige ' + nextPrestige + '/50\n\nThis resets your farm to level 1 with 2 coins, but ALL harvest coins will permanently earn +' + bonus + '% more.\n\nProceed?')) return;

  G.prestige = nextPrestige;
  G.coins = 2;
  G.totalXP = 0;
  G.level = 1;
  G.selectedCrop = null;
  G.shopExpanded = null;
  G.inventory = {};
  G.plots = Array.from({length:20}, (_, i) => ({
    idx: i,
    unlocked: i === 0,
    harvestedCount: 0,
    cropId: null,
    plantedAt: null,
    ready: false,
  }));
  checkAchievements();
  saveGame();
  renderAll();
  notify('⭐ Prestige ' + nextPrestige + ' achieved! Sell bonus: +' + bonus + '%', 'levelup');
}

function calcFarmScore() {
  return Math.floor(Math.pow(G.level, 2) * 300 + G.coins * 1 + G.totalXP * 0.5);
}

function formatTime(secs) {
  if (secs <= 0) return 'Ready!';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function canUnlockPlot(idx) {
  if (idx === 0) return true;
  return G.plots[idx - 1].harvestedCount >= 1;
}

// ============================================================
// GAME LOGIC
// ============================================================

// ============================================================
// BSV PRICE HELPERS
// 1 coin = 0.00001 BSV = 1,000 satoshis
// ============================================================
function coinsToSatoshis(coins) { return coins * 1000; }
function formatBSV(coins) {
  const bsv = coins * 0.00001;
  // Show up to 5 decimal places, trimming trailing zeros
  return bsv.toFixed(5).replace(/\.?0+$/, '') + ' BSV';
}

// SHOP: toggle the qty picker for a crop card
function toggleShopCard(cropId) {
  const crop = CROP_MAP[cropId];
  if (!crop) return;
  if (!isCropUnlocked(cropId)) {
    notify('🔒 Reach Level ' + crop.unlockLevel + ' to grow ' + crop.name + '!', 'error');
    return;
  }
  G.shopExpanded = (G.shopExpanded === cropId) ? null : cropId;
  renderShop();
}

// SHOP: stepper +/- buttons inside qty picker
function shopChangeQty(cropId, delta) {
  const el = document.getElementById('qty-val-' + cropId);
  if (!el) return;
  const crop = CROP_MAP[cropId];
  let val = parseInt(el.textContent) + delta;
  const maxAffordable = Math.max(1, Math.floor(G.coins / crop.seedCost));
  val = Math.max(1, Math.min(10, Math.min(val, maxAffordable)));
  el.textContent = val;
  const totalCoins = crop.seedCost * val;
  const totalEl = document.getElementById('qty-total-' + cropId);
  if (totalEl) totalEl.textContent = '🪙 ' + totalCoins;
  const bsvEl = document.getElementById('qty-bsv-' + cropId);
  if (bsvEl) bsvEl.textContent = formatBSV(totalCoins);
  const buyBtn = document.getElementById('buy-btn-' + cropId);
  if (buyBtn) buyBtn.disabled = G.coins < totalCoins;
  const bsvBtn = document.getElementById('bsv-btn-' + cropId);
  if (bsvBtn) bsvBtn.disabled = !G.walletConnected;
}

// SHOP: purchase seeds — coins deducted, seeds go to storage
function buySeeds(cropId, qty) {
  const crop = CROP_MAP[cropId];
  if (!crop || qty < 1 || qty > 10) return;
  const total = crop.seedCost * qty;
  if (G.coins < total) {
    notify('🪙 Need ' + total + ' coins for ' + qty + '× ' + crop.name + '!', 'error');
    shakeStat('stat-coins');
    return;
  }
  G.coins -= total;
  G.inventory[cropId] = (G.inventory[cropId] || 0) + qty;
  G.shopExpanded = null;
  saveGame();
  renderAll();
  notify('🛒 Bought ' + qty + '× ' + crop.name + ' seed' + (qty > 1 ? 's' : '') + '! Check storage.', 'unlock');
}

// SHOP: buy seeds with BSV
function buySeedsBSV(cropId, qty) {
  const crop = CROP_MAP[cropId];
  if (!crop || qty < 1 || qty > 10) return;
  if (!G.walletConnected) {
    notify('🔗 Connect your wallet first to pay with BSV!', 'error');
    return;
  }
  const totalCoins = crop.seedCost * qty;
  const satoshis = coinsToSatoshis(totalCoins);
  const ref = 'seeds-' + cropId + '-' + Date.now();
  const btn = document.getElementById('bsv-btn-' + cropId);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Paying…'; }
  payWithBSV(satoshis, ref,
    () => {
      // Success
      G.inventory[cropId] = (G.inventory[cropId] || 0) + qty;
      G.shopExpanded = null;
      saveGame();
      renderAll();
      notify('₿ Paid ' + formatBSV(totalCoins) + ' — got ' + qty + '× ' + crop.name + '!', 'unlock');
    },
    (err) => {
      if (btn) { btn.disabled = false; btn.textContent = '₿ ' + formatBSV(totalCoins); }
      notify('₿ BSV payment failed: ' + err, 'error');
    }
  );
}

// STORAGE: click a seed tile to select it for planting
function selectFromStorage(cropId) {
  if ((G.inventory[cropId] || 0) <= 0) return;
  G.selectedCrop = (G.selectedCrop === cropId) ? null : cropId;
  renderPlots();
  renderStorage();
}

// PLOTS: tap an empty plot to plant the selected seed from storage
function tryPlant(idx) {
  const plot = G.plots[idx];
  if (!plot.unlocked) { tryUnlockPlot(idx); return; }
  if (plot.cropId) return;

  if (!G.selectedCrop) {
    notify('🏒 Select a seed from storage below the farm first!', 'error');
    return;
  }
  const count = G.inventory[G.selectedCrop] || 0;
  if (count <= 0) {
    notify('🌱 No ' + CROP_MAP[G.selectedCrop].name + ' seeds left in storage!', 'error');
    G.selectedCrop = null;
    renderAll();
    return;
  }

  const crop = CROP_MAP[G.selectedCrop];
  G.inventory[G.selectedCrop] = count - 1;
  if (G.inventory[G.selectedCrop] <= 0) delete G.inventory[G.selectedCrop];

  plot.cropId = G.selectedCrop;
  plot.plantedAt = Date.now();
  plot.ready = false;

  // Keep selection active if more seeds of this type remain
  if (!(G.inventory[G.selectedCrop] > 0)) G.selectedCrop = null;

  saveGame();
  renderAll();
  notify('🌱 Planted ' + crop.name + '! (' + formatTime(crop.gameSecs) + ')', 'harvest');
}

function tryUnlockPlot(idx) {
  if (G.plots[idx].unlocked) return;
  const cost = PLOT_COSTS[idx];
  if (!canUnlockPlot(idx)) {
    notify(`⚠️ Harvest from plot ${idx} first!`, 'error');
    return;
  }
  if (G.coins < cost) {
    notify(`🪙 Need ${cost} coins to unlock plot ${idx + 1}!`, 'error');
    shakeStat('stat-coins');
    return;
  }
  G.coins -= cost;
  G.plots[idx].unlocked = true;
  checkAchievements();
  saveGame();
  renderAll();
  notify(`🔓 Plot ${idx + 1} unlocked!`, 'unlock');
}

function unlockPlotBSV(idx) {
  if (G.plots[idx].unlocked) return;
  const cost = PLOT_COSTS[idx];
  if (!canUnlockPlot(idx)) {
    notify(`⚠️ Harvest from plot ${idx} first!`, 'error');
    return;
  }
  if (!G.walletConnected) {
    notify('🔗 Connect your wallet first to pay with BSV!', 'error');
    return;
  }
  const satoshis = coinsToSatoshis(cost);
  const ref = 'plot-' + idx + '-' + Date.now();
  notify(`₿ Requesting BSV payment for Plot ${idx + 1}…`, 'harvest');
  payWithBSV(satoshis, ref,
    () => {
      G.plots[idx].unlocked = true;
      checkAchievements();
      saveGame();
      renderAll();
      notify(`🔓 Plot ${idx + 1} unlocked with BSV!`, 'unlock');
    },
    (err) => {
      notify('₿ BSV payment failed: ' + err, 'error');
    }
  );
}

function harvestCrop(idx) {
  const plot = G.plots[idx];
  if (!plot.ready) return;
  const crop = CROP_MAP[plot.cropId];

  const earnedCoins = applyEventModifiers(Math.floor(crop.sellPrice * prestigeMultiplier()));
  G.coins += earnedCoins;
  G.totalXP += crop.xp;
  plot.harvestedCount++;
  // Lifetime tracking (survives prestige)
  G.cropHarvests[crop.id] = (G.cropHarvests[crop.id] || 0) + 1;
  G.totalHarvestCount++;
  G.totalCoinsEarned += earnedCoins;
  const prevLevel = G.level;
  checkLevelUp();
  checkAchievements();
  plot.cropId = null;
  plot.plantedAt = null;
  plot.ready = false;
  saveGame();
  renderAll();

  // Floating coin label
  showFloatLabel(`+🪙${earnedCoins}`, idx);
  notify(`✨ Harvested ${crop.name}! +🪙${earnedCoins} +${crop.xp}XP`, 'harvest');

  if (G.level > prevLevel) {
    const ld = getLevelData(G.level);
    setTimeout(() => notify(`🎉 Level Up! You're now ${ld.title} (Lv${G.level})!`, 'levelup'), 300);
    if (ld.unlocks.length > 0) {
      setTimeout(() => notify(`🆕 Unlocked: ${ld.unlocks.map(id => CROP_MAP[id].name).join(', ')}!`, 'unlock'), 700);
    }
  }
}

function checkLevelUp() {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (G.totalXP >= LEVELS[i].xpMin) {
      G.level = LEVELS[i].lvl;
      return;
    }
  }
  G.level = 1;
}

// ============================================================
// TICK — runs every second
// ============================================================
function tick() {
  let changed = false;
  const now = Date.now();
  G.plots.forEach(plot => {
    if (plot.cropId && plot.plantedAt && !plot.ready) {
      const crop = CROP_MAP[plot.cropId];
      if (crop && (now - plot.plantedAt) >= crop.gameSecs * 1000) {
        plot.ready = true;
        changed = true;
        notify(`✨ ${crop.name} is ready to harvest!`, 'harvest');
      }
    }
  });
  checkRandomEvent();
  checkMerchant();
  renderStats();
  if (changed) {
    saveGame();
    renderPlots();
    renderStorage();
    renderShop();
  } else {
    renderPlotsOnly();
  }
}

// ============================================================
// RENDERING
// ============================================================
function renderAll() {
  renderStats();
  renderHeading();
  renderPlots();
  renderStorage();
  renderShop();
}

function renderStats() {
  const ld = getCurrentLevel();
  const nextLd = LEVELS[Math.min(G.level, LEVELS.length - 1)];
  const xpInLevel = G.totalXP - ld.xpMin;
  const xpNeeded = ld.xpMax - ld.xpMin;
  const xpPct = Math.min((xpInLevel / xpNeeded) * 100, 100);

  document.getElementById('stat-coins').textContent = G.coins;
  document.getElementById('stat-level').textContent = G.level;
  document.getElementById('stat-level-title').textContent = ld.title;
  document.getElementById('stat-xp').textContent = G.totalXP;
  document.getElementById('stat-xp-max').textContent = ld.xpMax;
  document.getElementById('xp-fill').style.width = xpPct + '%';
  document.getElementById('stat-score').textContent = calcFarmScore();

  // Prestige pill
  const pp = document.getElementById('prestige-pill');
  if (pp) {
    const p = G.prestige;
    if (p > 0 || G.level >= 10) {
      pp.style.display = 'flex';
      const starsEl = document.getElementById('prestige-stars');
      const bonusEl = document.getElementById('prestige-bonus');
      // Stars: filled star per prestige, show up to 5 then show number
      let starStr = '';
      if (p === 0) {
        starStr = '⭐ Prestige';
      } else if (p <= 10) {
        starStr = '⭐'.repeat(p);
      } else {
        starStr = '⭐×' + p;
      }
      if (starsEl) starsEl.textContent = starStr;
      if (bonusEl) bonusEl.textContent = p > 0 ? '+' + (p*10) + '%' : '';
      pp.className = 'prestige-pill';
      if (p >= 50) pp.classList.add('max');
      if (G.level >= 10 && p < 50) pp.classList.add('prestige-ready');
    } else {
      pp.style.display = 'none';
    }
  }

  // BSV status
  const bsvStatus = document.getElementById('bsv-status');
  if (G.walletConnected) {
    bsvStatus.textContent = '₿ ' + G.walletAddress.substring(0,8) + '…';
  } else {
    bsvStatus.textContent = 'Wallet: Local Mode';
  }
}

function renderPlotsOnly() {
  const grid = document.getElementById('plots-grid');
  if (!grid) return;
  const now = Date.now();
  G.plots.forEach((plot, idx) => {
    const tile = grid.querySelector(`[data-idx="${idx}"]`);
    if (!tile) return;
    if (plot.cropId && !plot.ready && plot.plantedAt) {
      const crop = CROP_MAP[plot.cropId];
      const elapsed = now - plot.plantedAt;
      const progress = Math.min(elapsed / (crop.gameSecs * 1000), 1);
      const remaining = Math.max(crop.gameSecs - elapsed/1000, 0);
      const scale = 0.2 + progress * 0.6;
      const opacity = 0.4 + progress * 0.6;

      const artEl = tile.querySelector('.crop-art');
      if (artEl) {
        artEl.style.transform = `scale(${scale.toFixed(3)}) translateY(${(-(scale*8)).toFixed(1)}px)`;
        artEl.style.opacity = opacity.toFixed(3);
      }

      // Update progress ring
      const ringFill = tile.querySelector('.progress-ring-fill');
      if (ringFill) {
        const r = 44;
        const circ = 2 * Math.PI * r;
        ringFill.setAttribute('stroke-dashoffset', (circ * (1 - progress)).toFixed(2));
      }

      // Footer time
      const footer = tile.querySelector('.plot-footer');
      if (footer) footer.textContent = `${crop.name} — ${formatTime(remaining)}`;
    }
  });
}

function renderPlots() {
  const grid = document.getElementById('plots-grid');
  if (!grid) return;
  const now = Date.now();

  grid.innerHTML = G.plots.map((plot, idx) => {
    const cost = PLOT_COSTS[idx];

    // LOCKED
    if (!plot.unlocked) {
      const canAfford = G.coins >= cost;
      const prevHarvested = idx === 0 || G.plots[idx-1].harvestedCount >= 1;
      const bsvCost = formatBSV(cost);
      const canUnlock = prevHarvested;
      return `<div class="plot-tile locked" data-idx="${idx}">
        <div class="plot-visual" style="background:#131310;border:2px solid rgba(255,255,255,0.05)">
          <div class="plot-overlay" style="flex-direction:column;gap:4px">
            ${lockSVG()}
          </div>
          <div class="plot-label" style="color:${canAfford?'#FFD140':'#888'}">🪙 ${cost}</div>
        </div>
        <div class="plot-footer" style="display:flex;flex-direction:column;gap:3px;padding:5px 6px">
          <span style="font-size:9px;color:var(--text-dim);text-align:center">${!canUnlock ? '⚠️ harvest first' : 'Plot ' + (idx+1)}</span>
          ${canUnlock ? `<div style="display:flex;gap:4px">
            <button onclick="tryUnlockPlot(${idx})" style="flex:1;background:${canAfford?'rgba(255,209,64,0.15)':'rgba(100,100,100,0.15)'};border:1px solid ${canAfford?'rgba(255,209,64,0.4)':'rgba(100,100,100,0.3)'};border-radius:6px;padding:3px 4px;font-size:9px;font-weight:800;color:${canAfford?'#FFD140':'#888'};cursor:${canAfford?'pointer':'not-allowed'}" ${canAfford?'':'disabled'}>🪙 ${cost}</button>
            <button onclick="unlockPlotBSV(${idx})" style="flex:1;background:${G.walletConnected?'rgba(200,134,10,0.2)':'rgba(100,100,100,0.1)'};border:1px solid ${G.walletConnected?'rgba(200,134,10,0.5)':'rgba(100,100,100,0.2)'};border-radius:6px;padding:3px 4px;font-size:9px;font-weight:800;color:${G.walletConnected?'#F5A623':'#666'};cursor:${G.walletConnected?'pointer':'not-allowed'}" ${G.walletConnected?'':'disabled'} title="${G.walletConnected?'Pay with BSV':'Connect wallet'}">₿ ${bsvCost}</button>
          </div>` : ''}
        </div>
      </div>`;
    }

    // EMPTY
    if (!plot.cropId) {
      const isTarget = G.selectedCrop !== null && (G.inventory[G.selectedCrop] || 0) > 0;
      let overlayContent = '';
      if (isTarget) {
        overlayContent = `<div style="opacity:0.55;transform:scale(0.7)">${makeCropCardSVG(G.selectedCrop, 50, 50)}</div>`;
      } else {
        overlayContent = `<span class="plus-sign">+</span>`;
      }
      return `<div class="plot-tile empty ${isTarget?'plant-target':''}" data-idx="${idx}" onclick="tryPlant(${idx})">
        <div class="plot-visual">
          <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
          <div class="plot-overlay">${overlayContent}</div>
        </div>
        <div class="plot-footer">Plot ${idx+1} — ${isTarget?'Tap to plant':' Empty'}</div>
      </div>`;
    }

    const crop = CROP_MAP[plot.cropId];

    // READY
    if (plot.ready) {
      return `<div class="plot-tile ready" data-idx="${idx}" onclick="harvestCrop(${idx})">
        <div class="plot-visual">
          <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
          <div class="plot-overlay" style="display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px">
            <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(plot.cropId)}</svg>
          </div>
        </div>
        <div class="plot-footer"><span class="footer-harvest">✨ Harvest! +🪙${crop.sellPrice}</span></div>
      </div>`;
    }

    // GROWING
    const elapsed = now - plot.plantedAt;
    const progress = Math.min(elapsed / (crop.gameSecs * 1000), 1);
    const remaining = Math.max(crop.gameSecs - elapsed/1000, 0);
    const scale = 0.2 + progress * 0.6;
    const opacity = 0.4 + progress * 0.6;
    const r = 44;
    const circ = 2 * Math.PI * r;
    const offset = circ * (1 - progress);

    return `<div class="plot-tile growing" data-idx="${idx}">
      <div class="plot-visual">
        <div class="plot-soil-bg">${soilSVG('100%','100%')}</div>
        <div class="plot-overlay" style="display:flex;align-items:center;justify-content:center;overflow:hidden">
          <div class="crop-art" style="transform:scale(${scale.toFixed(3)}) translateY(${(-(scale*8)).toFixed(1)}px);opacity:${opacity.toFixed(3)};transform-origin:center center">
            <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(plot.cropId)}</svg>
          </div>
        </div>
        <svg class="progress-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle class="progress-ring-bg" cx="50" cy="50" r="${r}" stroke-width="5"/>
          <circle class="progress-ring-fill" cx="50" cy="50" r="${r}"
            stroke-width="5"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
      </div>
      <div class="plot-footer">${crop.name} — ${formatTime(remaining)}</div>
    </div>`;
  }).join('');
}

function renderStorage() {
  const grid = document.getElementById('storage-grid');
  const badge = document.getElementById('storage-count-badge');
  if (!grid) return;

  const entries = Object.entries(G.inventory).filter(([,qty]) => qty > 0);
  // Sort by crop order so it's consistent
  entries.sort((a, b) => {
    const ai = CROPS.findIndex(c => c.id === a[0]);
    const bi = CROPS.findIndex(c => c.id === b[0]);
    return ai - bi;
  });

  if (badge) {
    if (entries.length === 0) {
      badge.textContent = 'empty';
    } else {
      const total = entries.reduce((s, [,q]) => s + q, 0);
      badge.textContent = entries.length + ' type' + (entries.length !== 1 ? 's' : '') + ', ' + total + ' seed' + (total !== 1 ? 's' : '');
    }
  }

  if (entries.length === 0) {
    grid.innerHTML = '<div class="storage-empty">No seeds yet — buy some from the shop →</div>';
    return;
  }

  grid.innerHTML = entries.map(([cropId, qty]) => {
    const crop = CROP_MAP[cropId];
    const theme = CROP_THEME[cropId] || { bg: '#1A1A1A' };
    const selected = G.selectedCrop === cropId;
    return `<div class="seed-tile${selected ? ' selected' : ''}" onclick="selectFromStorage('${cropId}')" title="${crop.name}: ${qty} seed${qty !== 1 ? 's' : ''}">
      <div class="seed-tile-art" style="background:${theme.bg}">
        <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(cropId)}</svg>
        <span class="seed-tile-count">${qty}</span>
      </div>
      <div class="seed-tile-name">${crop.name}</div>
    </div>`;
  }).join('');
}

function renderShop() {
  const list = document.getElementById('shop-crops-list');
  const banner = document.getElementById('selected-banner');
  if (!list) return;

  // Show which seed is selected for planting (pulled from storage)
  if (G.selectedCrop) {
    const sc = CROP_MAP[G.selectedCrop];
    const qty = G.inventory[G.selectedCrop] || 0;
    banner.innerHTML = `<div class="selected-indicator">
      <svg width="18" height="18" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">${cropArt(G.selectedCrop)}</svg>
      ${sc.name} ×${qty} ready to plant
      <button onclick="G.selectedCrop=null;renderPlots();renderStorage();">✕</button>
    </div>`;
  } else {
    banner.innerHTML = '';
  }

  // Group crops by unlock level
  const grouped = {};
  CROPS.forEach(c => {
    if (!grouped[c.unlockLevel]) grouped[c.unlockLevel] = [];
    grouped[c.unlockLevel].push(c);
  });
  const sortedLevels = Object.keys(grouped).map(Number).sort((a, b) => a - b);

  list.innerHTML = sortedLevels.map(lvl => {
    const ld = getLevelData(lvl);
    const cropsHtml = grouped[lvl].map(crop => {
      const unlocked = isCropUnlocked(crop.id);
      const affordable = G.coins >= crop.seedCost;
      const expanded = G.shopExpanded === crop.id;
      const theme = CROP_THEME[crop.id] || { bg: '#1A1A1A', border: 'rgba(255,255,255,0.2)' };
      const inStock = G.inventory[crop.id] || 0;

      let classes = 'crop-card';
      if (expanded) classes += ' expanded';
      if (!unlocked) classes += ' locked-crop';

      const artSvg = `<svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="background:${theme.bg};border-radius:6px">${cropArt(crop.id)}</svg>`;

      // Stock badge (seeds in storage)
      const stockBadge = inStock > 0
        ? `<span style="font-size:9px;background:rgba(111,207,58,0.2);color:var(--green-hi);border-radius:6px;padding:1px 4px;margin-left:3px;font-weight:800">×${inStock}</span>`
        : '';

      // Lock / level badge
      const lockBadge = !unlocked
        ? `<span class="crop-lock-badge">Lv${crop.unlockLevel}</span>`
        : '';

      // Compact card: icon + name/stats as a flex row (works well at ~120px width)
      const mainRow = `<div class="crop-card-main" style="display:flex;align-items:center;gap:7px">
        <div class="crop-card-icon">${artSvg}</div>
        <div class="crop-card-info">
          <div class="crop-card-name">${crop.name}${stockBadge}</div>
          <div class="crop-card-stats">
            <span class="crop-stat-coin">🪙${crop.seedCost}</span>
            <span class="crop-stat-sell">→${crop.sellPrice}</span>
          </div>
          <div class="crop-card-stats" style="margin-top:1px">
            <span class="crop-stat-time">${formatTime(crop.gameSecs)}</span>
          </div>
        </div>
        ${lockBadge}
      </div>`;

      let qtyPicker = '';
      if (expanded && unlocked) {
        const initQty = Math.min(1, Math.max(1, Math.floor(G.coins / crop.seedCost)));
        const totalCoins = crop.seedCost * initQty;
        const canAfford = G.coins >= crop.seedCost;
        qtyPicker = `<div class="crop-card-qty">
          <button class="qty-btn" onclick="event.stopPropagation();shopChangeQty('${crop.id}',-1)">−</button>
          <span class="qty-display" id="qty-val-${crop.id}">${initQty}</span>
          <button class="qty-btn" onclick="event.stopPropagation();shopChangeQty('${crop.id}',1)">+</button>
          <span class="qty-total" id="qty-total-${crop.id}">🪙 ${totalCoins}</span>
          <button class="buy-btn" id="buy-btn-${crop.id}"
            onclick="event.stopPropagation();buySeeds('${crop.id}',parseInt(document.getElementById('qty-val-${crop.id}').textContent))"
            ${canAfford ? '' : 'disabled'}>Buy</button>
        </div>
        <div style="display:flex;justify-content:flex-end;padding:4px 0 2px;border-top:1px solid rgba(255,209,64,0.15);margin-top:4px">
          <button class="bsv-buy-btn" id="bsv-btn-${crop.id}"
            onclick="event.stopPropagation();buySeedsBSV('${crop.id}',parseInt(document.getElementById('qty-val-${crop.id}').textContent))"
            ${G.walletConnected ? '' : 'disabled'}

            ₿ <span id="qty-bsv-${crop.id}">${formatBSV(totalCoins)}</span>

      }

      return `<div class="${classes}" onclick="toggleShopCard('${crop.id}')">
        ${mainRow}

    }).join('');

    const dimmed = lvl > G.level ? 'opacity:0.35' : '';
    return `<div class="shop-level-divider" style="${dimmed}">Level ${lvl} — ${ld.title}</div>${cropsHtml}`;
  }).join('');
}

function startEditName(which) {
  const isF = which === 'farm';
  const displayId = isF ? 'farm-name-display' : 'farmer-name-display';
  const displayEl = document.getElementById(displayId);
  if (!displayEl) return;
  if (displayEl.parentElement.querySelector('.name-input')) return;

  const current = isF ? G.farmName : G.farmerName;
  const input = document.createElement('input');
  input.className = 'name-input';
  input.maxLength = 15;
  input.value = current;
  input.style.fontSize = isF ? '16px' : '14px';

  displayEl.style.display = 'none';
  displayEl.parentElement.insertBefore(input, displayEl);
  input.focus();
  input.select();

  function commit() {
    const val = input.value.trim().slice(0, 15) || (isF ? 'My Farm' : 'Farmer');
    if (isF) { G.farmName = val; } else { G.farmerName = val; }
    saveGame();
    renderHeading();
    input.remove();
    displayEl.style.display = '';
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.remove(); displayEl.style.display = ''; }
  });
}

function renderHeading() {
  const fn = document.getElementById('farm-name-display');
  const fr = document.getElementById('farmer-name-display');
  if (fn) fn.textContent = '🌿 ' + (G.farmName || 'My Farm');
  if (fr) fr.textContent = G.farmerName || 'Farmer';
}

// Mins → ms helpers
const EVENT_MIN_GAP  = 2 * 60 * 1000;  // at least 2 min between events
const EVENT_MAX_GAP  = 5 * 60 * 1000;  // at most  5 min
let _nextEventTime = 0; // absolute ms for next possible event

function scheduleNextEvent() {
  const gap = EVENT_MIN_GAP + Math.random() * (EVENT_MAX_GAP - EVENT_MIN_GAP);
  _nextEventTime = Date.now() + gap;
}

function checkRandomEvent() {
  if (Date.now() < _nextEventTime) return;
  // Don't stack on top of merchant or another event
  if (!document.getElementById('event-overlay').classList.contains('hidden')) return;
  if (G.merchantActive) return;

  const eligible = RANDOM_EVENTS.filter(e => e.canTrigger());
  if (eligible.length === 0) { scheduleNextEvent(); return; }

  const ev = eligible[Math.floor(Math.random() * eligible.length)];
  showEventModal(ev);
  scheduleNextEvent();
}

function showEventModal(ev) {
  const cost = ev.cost(G.level);
  const canAfford = G.coins >= cost;
  const descText = ev.desc
    .replace('{cost}', cost)
    .replace('{steal}', '30%');

  document.getElementById('event-icon').textContent  = ev.icon;
  document.getElementById('event-title').textContent = ev.title;
  document.getElementById('event-desc').textContent  = descText;

  const btns = document.getElementById('event-btns');
  const fixLabel = ev.fixLabel(cost);

  let html = '<button class="event-btn-primary" id="ev-fix-btn"'
    + ((!canAfford && cost > 0) ? ' disabled' : '')
    + ' onclick="resolveEvent(true)">' + fixLabel + '</button>';

  if (ev.onIgnore !== null) {
    html += '<button class="event-btn-secondary" onclick="resolveEvent(false)">Ignore</button>';
  }

  btns.innerHTML = html;
  document.getElementById('event-overlay').classList.remove('hidden');
  G._eventsEncountered = (G._eventsEncountered || 0) + 1;

  // Store current event for resolving
  window._currentEvent = { ev, cost };
}

function resolveEvent(fix) {
  const { ev, cost } = window._currentEvent || {};
  if (!ev) return;
  document.getElementById('event-overlay').classList.add('hidden');
  window._currentEvent = null;

  if (fix) {
    if (cost > 0) {
      if (G.coins < cost) { notify('🪙 Not enough coins!', 'error'); return; }
      G.coins -= cost;
    }
    if (cost > 0) G._eventsFixed = (G._eventsFixed || 0) + 1;
    // Track specific event types for achievements
    if (ev.id === 'sun')  G._sunBonusCount  = (G._sunBonusCount  || 0) + 1;
    if (ev.id === 'bees') G._beeBoostCount  = (G._beeBoostCount  || 0) + 1;
    ev.onFix();
  } else if (ev.onIgnore) {
    ev.onIgnore();
  }
  saveGame();
  renderAll();
}

// Apply sun / aphid bonuses to harvest (called from harvestCrop)
function applyEventModifiers(baseCoins) {
  let coins = baseCoins;
  if (G._sunBonus) { coins = Math.floor(coins * 1.25); G._sunBonus = false; }
  if (G._aphidPenalty) { coins = Math.floor(coins * 0.80); G._aphidPenalty = false; }
  return coins;
}

            if (p.cropId && p.plantedAt && !p.ready) {
              const crop = CROP_MAP[p.cropId];
              const elapsed = Date.now() - p.plantedAt;
              const remaining = Math.max(0, crop.gameSecs * 1000 - elapsed);
              p.plantedAt -= Math.floor(remaining * (pct / 100));
              boosted++;
            }
          });
          saveGame(); renderPlots();
          notify('🧪 Tonic boosted ' + boosted + ' crop' + (boosted !== 1 ? 's' : '') + ' by ' + pct + '%!', 'harvest');
        },
      };
    },
    canTrigger: () => G.plots.some(p => p.cropId && !p.ready),
  },
];

const MERCHANT_DURATION = 3 * 60 * 1000; // 3 min window
const MERCHANT_MIN_GAP  = 10 * 60 * 1000;
const MERCHANT_MAX_GAP  = 15 * 60 * 1000;
let _nextMerchantTime = 0;

function scheduleNextMerchant() {
  const gap = MERCHANT_MIN_GAP + Math.random() * (MERCHANT_MAX_GAP - MERCHANT_MIN_GAP);
  _nextMerchantTime = Date.now() + gap;
}

function checkMerchant() {
  const now = Date.now();

  // If merchant is active, update timer or dismiss if expired
  if (G.merchantActive) {
    const remaining = Math.max(0, G.merchantExpiry - now);
    const timerEl = document.getElementById('merchant-timer');
    if (timerEl) timerEl.textContent = 'Leaves in ' + formatTime(remaining / 1000);
    if (remaining <= 0) dismissMerchant();
    return;
  }

  if (now < _nextMerchantTime) return;
  if (!document.getElementById('event-overlay').classList.contains('hidden')) return;

  spawnMerchant();
}

function spawnMerchant() {
  // Pick a random deal type; filter ones needing crops if none growing
  const available = MERCHANT_DEALS.filter(d => !d.canTrigger || d.canTrigger());
  if (available.length === 0) { scheduleNextMerchant(); return; }

  const dealType = available[Math.floor(Math.random() * available.length)];
  const deal = dealType.makeOffer();

  G.merchantActive = true;
  G.merchantDeal = { ...deal, execute: null }; // store serialisable parts
  G.merchantExpiry = Date.now() + MERCHANT_DURATION;

  // Keep the live execute fn in memory (not in G, can't serialise functions)
  window._merchantExecute = deal.execute;
  window._merchantCanAfford = deal.canAfford;

  document.getElementById('merchant-title').textContent = dealType.title;
  document.getElementById('merchant-offer').textContent = deal.offerText;
  const dealBtn = document.getElementById('merchant-deal-btn');
  dealBtn.textContent = deal.btnText;
  dealBtn.disabled = !deal.canAfford();

  document.getElementById('merchant-banner').classList.remove('hidden');
  saveGame();
  scheduleNextMerchant();
}

function acceptMerchantDeal() {
  if (!window._merchantExecute) return;
  if (window._merchantCanAfford && !window._merchantCanAfford()) {
    notify('🪙 Not enough coins for this deal!', 'error');
    return;
  }
  G._merchantDealsAccepted = (G._merchantDealsAccepted || 0) + 1;
  window._merchantExecute();
  window._merchantExecute = null;
  window._merchantCanAfford = null;
  G.merchantActive = false;
  G.merchantDeal = null;
  checkAchievements();
  saveGame();
  renderAll();
  document.getElementById('merchant-banner').classList.add('hidden');
}

function dismissMerchant() {
  G.merchantActive = false;
  G.merchantDeal = null;
  window._merchantExecute = null;
  window._merchantCanAfford = null;
  document.getElementById('merchant-banner').classList.add('hidden');
  saveGame();
}

// Restore merchant UI after a page reload
function restoreMerchantIfActive() {
  if (!G.merchantActive || !G.merchantDeal || Date.now() >= G.merchantExpiry) {
    G.merchantActive = false;
    return;
  }
  // Rebuild the deal object from saved data (execute fn is gone — re-create a basic one)
  // We don't reconstruct execute; instead just show the banner so user can pass
  document.getElementById('merchant-title').textContent = '🧙 Wandering Merchant';
  document.getElementById('merchant-offer').textContent = G.merchantDeal.offerText || 'Special offer available!';
  const dealBtn = document.getElementById('merchant-deal-btn');
  dealBtn.textContent = G.merchantDeal.btnText || 'Deal';
  dealBtn.disabled = true; // can't re-execute after reload without fn — just let it expire
  document.getElementById('merchant-banner').classList.remove('hidden');
}

// Per-crop milestone thresholds
const CROP_MILESTONES = [
  { key: 'first',    count: 1,   icon: '🌱', label: 'First Harvest',  suffix: '' },
  { key: 'seasoned', count: 10,  icon: '🌿', label: 'Seasoned',        suffix: '' },
  { key: 'veteran',  count: 50,  icon: '🥇', label: 'Veteran',          suffix: '' },
  { key: 'master',   count: 200, icon: '👑', label: 'Master Grower',    suffix: '' },
];

// Build per-crop achievements dynamically from CROPS + CROP_MILESTONES
function buildCropAchievements() {
  const out = [];
  CROPS.forEach(crop => {
    CROP_MILESTONES.forEach(m => {
      out.push({
        id: 'crop_' + crop.id + '_' + m.key,
        icon: m.icon,
        name: crop.name + ': ' + m.label,
        desc: 'Harvest ' + crop.name + ' ' + m.count + ' time' + (m.count > 1 ? 's' : ''),
        category: 'crops',
        cropId: crop.id,
        milestone: m,
        check: (G) => {
          const n = G.cropHarvests[crop.id] || 0;
          return {
            earned: n >= m.count,
            progress: Math.min(n / m.count, 1),
            progressLabel: n + ' / ' + m.count,
          };
        },
      });
    });
  });
  return out;
}

// Build the combined list once at startup
let ALL_ACHIEVEMENTS = [];
function buildAllAchievements() {
  ALL_ACHIEVEMENTS = [...buildCropAchievements(), ...FARM_ACHIEVEMENTS];
}

// ── Achievement engine ─────────────────────────────────────
let _pendingNewAchievements = []; // ids newly earned, waiting for journal dot

function checkAchievements() {
  let anyNew = false;
  ALL_ACHIEVEMENTS.forEach(ach => {
    if (G.achievementsEarned.includes(ach.id)) return;
    const result = ach.check(G);
    if (result.earned) {
      G.achievementsEarned.push(ach.id);
      _pendingNewAchievements.push(ach.id);
      anyNew = true;
      // Toast — brief delay so it doesn't clash with harvest toast
      setTimeout(() => {
        notify('🏅 Achievement: ' + ach.name + '!', 'unlock');
      }, 600);
    }
  });
  if (anyNew) {
    saveGame();
    // Show red dot on journal button
    const dot = document.getElementById('journal-new-badge');
    if (dot) dot.style.display = 'inline-block';
  }
}

let _currentJTab = 'crops';

function openJournal() {
  // Clear the new-badge dot
  _pendingNewAchievements = [];
  const dot = document.getElementById('journal-new-badge');
  if (dot) dot.style.display = 'none';
  renderJournal();
  document.getElementById('journal-overlay').classList.remove('hidden');
}

function closeJournal() {
  document.getElementById('journal-overlay').classList.add('hidden');
}

function showJTab(tab) {
  _currentJTab = tab;
  document.querySelectorAll('.jtab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(tab)));
  document.querySelectorAll('.jtab-panel').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('jtab-' + tab);
  if (el) el.classList.add('active');
  renderJournal();
}

function renderJournal() {
  const earned = new Set(G.achievementsEarned);
  const total  = ALL_ACHIEVEMENTS.length;
  const done   = earned.size;

  document.getElementById('journal-summary').textContent =
    done + ' / ' + total + ' achievements earned';

  if (_currentJTab === 'crops') renderCropsTab(earned);
  else if (_currentJTab === 'farm') renderFarmTab(earned);
  else if (_currentJTab === 'events') renderEventsTab(earned);
}

function renderCropsTab(earned) {
  const panel = document.getElementById('jtab-crops');
  if (!panel) return;

  // One row per crop showing harvest count + milestone badges
  let html = '<div style="margin-bottom:10px">';
  CROPS.forEach(crop => {
    const count = G.cropHarvests[crop.id] || 0;
    const theme = CROP_THEME[crop.id] || { bg:'#1A1A1A' };
    const artSvg = '<svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"'
      + ' style="background:' + theme.bg + ';border-radius:7px">' + cropArt(crop.id) + '</svg>';

    // Badge state for each milestone
    const badges = CROP_MILESTONES.map(m => {
      const achId = 'crop_' + crop.id + '_' + m.key;
      const isEarned = earned.has(achId);
      let cls = 'crop-badge';
      if (m.key === 'master' && isEarned) cls += ' platinum';
      else if (m.key === 'veteran' && isEarned) cls += ' gold';
      else if (isEarned) cls += ' earned';
      const tip = m.label + ' (' + m.count + '×)';
      return '<div class="' + cls + '" title="' + tip + '">' + (isEarned ? m.icon : '·') + '</div>';
    }).join('');

    const unlocked = crop.unlockLevel <= G.level || G.prestige > 0 || count > 0;
    const dimStyle = unlocked ? '' : 'opacity:0.35';
    html += '<div class="crop-journal-row" style="' + dimStyle + '">';
    html += '<div class="crop-journal-art">' + artSvg + '</div>';
    html += '<div class="crop-journal-info">';
    html += '<div class="crop-journal-name">' + crop.name + '</div>';
    html += '<div class="crop-journal-count">' + (count > 0 ? count + ' harvested' : unlocked ? 'Not yet harvested' : 'Locked — Lv' + crop.unlockLevel) + '</div>';
    html += '</div>';
    html += '<div class="crop-journal-badges">' + badges + '</div>';
    html += '</div>';
  });
  html += '</div>';
  panel.innerHTML = html;
}

function renderAchSection(title, achs, earned) {
  let html = '<div class="ach-section-title">' + title + '</div><div class="ach-grid">';
  achs.forEach(ach => {
    const result = ach.check(G);
    const isNew = _pendingNewAchievements.includes(ach.id);
    let cls = 'ach-card';
    if (result.earned && isNew) cls += ' earned-new';
    else if (result.earned) cls += ' earned';
    else if (result.progress === 0) cls += ' locked';

    const pct = Math.round(result.progress * 100);
    html += '<div class="' + cls + '">';
    if (result.earned) html += '<span class="ach-earned-tick">✓</span>';
    html += '<div class="ach-icon">' + ach.icon + '</div>';
    html += '<div class="ach-name">' + ach.name + '</div>';
    html += '<div class="ach-desc">' + ach.desc + '</div>';
    if (!result.earned && result.progress > 0) {
      html += '<div class="ach-progress">' + result.progressLabel + '</div>';
      html += '<div class="ach-progress-bar"><div class="ach-progress-fill" style="width:' + pct + '%"></div></div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderFarmTab(earned) {
  const panel = document.getElementById('jtab-farm');
  if (!panel) return;
  const farmAchs = ALL_ACHIEVEMENTS.filter(a => a.category === 'farm');
  const sections = [
    { title: 'Harvests', ids: ['total_10','total_50','total_100','total_500','total_1000'] },
    { title: 'Coins Earned', ids: ['coins_100','coins_500','coins_2000','coins_10000','coins_50000'] },
    { title: 'Plots', ids: ['plots_5','plots_10','plots_20'] },
    { title: 'Levels', ids: ['level_5','level_10'] },
    { title: 'Diversity', ids: ['diverse_5','diverse_10','diverse_20'] },
    { title: 'Specialist', ids: ['garlic_10'] },
    { title: 'Prestige', ids: ['prestige_1','prestige_5','prestige_10','prestige_25','prestige_50'] },
  ];
  let html = '';
  sections.forEach(sec => {
    const achs = sec.ids.map(id => farmAchs.find(a => a.id === id)).filter(Boolean);
    html += renderAchSection(sec.title, achs, earned);

  panel.innerHTML = html;
}

function renderEventsTab(earned) {
  const panel = document.getElementById('jtab-events');
  if (!panel) return;
  const evAchs = ALL_ACHIEVEMENTS.filter(a => a.category === 'events');
  const sections = [
    { title: 'Random Events', ids: ['ev_first_event','ev_events_10','ev_fix_event','ev_fix_10'] },

    const achs = sec.ids.map(id => evAchs.find(a => a.id === id)).filter(Boolean);
    html += renderAchSection(sec.title, achs, earned);

    window.platformSDK.sendCommand({ type: 'connection', navbg: '#111D0F' });

      if (data.type === 'connection-response') {
        if (data.payload && !data.payload.anonymous && data.payload.wallet) {
          G.walletConnected = true;
          G.walletAddress = data.payload.wallet.address;
          saveGame();
          renderStats();
          notify('✅ Wallet connected!', 'unlock');
        } else {
          notify('👤 Running anonymously — coins only mode.', 'error');
          setPlayerState('anonymous');
        }

    // Local dev mode — stub
    console.log('Dev mode: BSV wallet not available. Running in coins-only mode.');
    notify('🔧 Dev mode: BSV not available. Use coins!', 'error');
    setPlayerState('anonymous');
  }
}

/**
 * Pay with BSV — stub for dev mode.
 * When on Metanet.page, this sends a real pay command.
 * @param {number} satoshis  — coinPrice * 1000
 * @param {string} ref       — unique reference
 * @param {Function} onSuccess — called with payload on success
 * @param {Function} onFail    — called with error message on fail
 */
function payWithBSV(satoshis, ref, onSuccess, onFail) {
  if (window.platformSDK && G.walletConnected) {
    // Real payment via Metanet
    const GAME_BSV_ADDRESS = '1LMaShk9VaQSWrsEYUukuoWMEVAJckrxCM';
    window.platformSDK.sendCommand({
      type: 'pay',
      ref: ref,
      recipients: [{ address: GAME_BSV_ADDRESS, value: satoshis, note: 'Plot Twist purchase' }],
    });
    window.platformSDK.onCommand((data) => {
      if (data.type === 'pay-response' && data.payload.ref === ref) {
        if (data.payload.success) {
          onSuccess(data.payload);
        } else {
          onFail(data.payload.message || 'Payment failed');
        }
      }
    });
  } else {
    // Dev mode stub — always fails gracefully
    console.log(`Dev mode: BSV payment stubbed (${satoshis} sats, ref: ${ref}). Use coins instead.`);
    onFail('Wallet not available in dev mode. Use coins instead.');
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadGame();

  // Try to connect wallet if platform SDK present
  if (window.platformSDK) {
    connectWallet();
  }

  buildAllAchievements();
  checkAchievements(); // evaluate on load (for returning players)
  renderAll();

  // Schedule first event and merchant
  scheduleNextEvent();
  scheduleNextMerchant();
  restoreMerchantIfActive();

  // Close journal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeJournal();
      document.getElementById('event-overlay').classList.add('hidden');
    }
  });

  // Tick every second
  setInterval(tick, 1000);

  // Also re-render shop when coins change (handled in renderAll already)
}

// Run
init();
</script>
